name: Deploy AI Service → EC2 GPU

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2 GPU
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2 GPU via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AI_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            set -e
            if [ ! -d "/opt/aura-ai" ]; then
              echo "Cloning repo for the first time..."
              sudo mkdir -p /opt/aura-ai
              sudo chown -R $USER:$USER /opt/aura-ai
              git clone https://github.com/lengthanhdat/AuraAcademic_AI.git /opt/aura-ai
              cd /opt/aura-ai
              sudo apt-get update
              sudo apt-get install -y python3-venv
              python3 -m venv venv
              if ! command -v pm2 &> /dev/null; then
                curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
                sudo apt-get install -y nodejs
                sudo npm install -g pm2
              fi
            fi
            
            # Clean up disk space
            sudo apt-get clean
            rm -rf ~/.cache/pip
            
            cd /opt/aura-ai
            git fetch origin main
            git reset --hard origin/main

            source venv/bin/activate
            pip install --no-cache-dir -r requirements.txt -q

            pm2 restart aura-ai || pm2 start \
              "bash -c 'cd /opt/aura-ai && source venv/bin/activate && python main.py'" \
              --name "aura-ai"

            pm2 restart aura-litellm || pm2 start \
              "bash -c 'cd /opt/aura-ai && source venv/bin/activate && litellm --config litellm_config.yaml --port 4000'" \
              --name "aura-litellm"

            pm2 save
            sleep 5
            curl -f http://localhost:8001/docs && echo "✅ AI deployed!" || echo "❌ Health check failed"
