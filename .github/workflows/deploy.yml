name: Deploy AI Service → EC2 GPU

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2 GPU (via SSM)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Deploy to EC2 via AWS SSM
        run: |
          SCRIPT_BASE64=$(cat << 'EOF' | base64 -w 0
          set -e
          
          # 1. Setup base directory and dependencies
          if [ ! -d "/opt/aura-ai" ]; then
            echo "Cloning repo for the first time..."
            sudo mkdir -p /opt/aura-ai
            sudo chown -R $USER:$USER /opt/aura-ai
            git clone https://github.com/lengthanhdat/AuraAcademic_AI.git /opt/aura-ai
            cd /opt/aura-ai
            sudo apt-get update
            sudo apt-get install -y python3-venv
            python3 -m venv venv
            if ! command -v pm2 &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
              sudo npm install -g pm2
            fi
          fi
          
          # Auto-resize partition in case EBS was expanded but OS didn't catch up
          sudo growpart /dev/nvme0n1 1 || true
          sudo resize2fs /dev/nvme0n1p1 || true
          sudo resize2fs /dev/root || true
          
          # Clean up disk space
          sudo apt-get clean
          rm -rf ~/.cache/pip
          
          # 2. Pull latest code
          cd /opt/aura-ai
          git fetch origin main
          git reset --hard origin/main
          
          # 3. Setup Python environment
          source venv/bin/activate
          pip install --no-cache-dir -r requirements.txt -q
          
          # 4. Inject Environment Variables
          echo "GEMINI_API_KEY_1=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GEMINI_API_KEY_3=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GEMINI_API_KEY_4=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GEMINI_API_KEY_5=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GROQ_API_KEY_1=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "GROQ_API_KEY_2=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "GROQ_API_KEY_3=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "GROQ_API_KEY_4=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "GROQ_API_KEY_5=${{ secrets.GROQ_API_KEY }}" >> .env
          
          # 5. Start/Restart Services
          pm2 delete aura-ai || true
          pm2 start bash \
            --name "aura-ai" \
            -- -c "cd /opt/aura-ai && source venv/bin/activate && export BACKEND_API_URL=\"${{ secrets.BACKEND_API_URL }}\" && python main.py"
          
          pm2 delete aura-litellm || true
          pm2 start bash \
            --name "aura-litellm" \
            -- -c "cd /opt/aura-ai && source venv/bin/activate && set -a && source .env && set +a && litellm --config litellm_config.yaml --port 4000"
          
          pm2 save
          
          # 6. Verify Services
          echo "Waiting for services to start..."
          for i in {1..6}; do
            sleep 5
            if curl -s -f http://localhost:8001/docs > /dev/null; then
              echo "✅ aura-ai (FastAPI) is up!"
              break
            fi
            echo "Waiting for aura-ai..."
          done
          
          for i in {1..6}; do
            sleep 5
            if curl -s -f http://localhost:4000/health > /dev/null; then
              echo "✅ aura-litellm is up!"
              break
            fi
            echo "Waiting for aura-litellm..."
          done
          
          if curl -s -f http://localhost:8001/docs > /dev/null && curl -s -f http://localhost:4000/health > /dev/null; then
            echo "✅ All services deployed successfully via SSM!"
          else
            echo "❌ Health check failed. Dumping PM2 logs:"
            pm2 logs --lines 50 --nostream
            exit 1
          fi
          EOF
          )
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.AI_EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[ \"echo $SCRIPT_BASE64 | base64 -d > /tmp/deploy.sh\", \"sudo -u ubuntu bash /tmp/deploy.sh\" ]" \
            --query "Command.CommandId" \
            --output text)
            
          echo "🚀 Started SSM Command: $COMMAND_ID"
          echo "⏳ Waiting for execution to complete..."
          
          # Wait for execution
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ secrets.AI_EC2_INSTANCE_ID }}" || true
          
          # Fetch results
          STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.AI_EC2_INSTANCE_ID }}" --query "Status" --output text)
          
          echo "--- 📜 STANDARD OUTPUT ---"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.AI_EC2_INSTANCE_ID }}" --query "StandardOutputContent" --output text
          
          echo "--- 🚨 STANDARD ERROR ---"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.AI_EC2_INSTANCE_ID }}" --query "StandardErrorContent" --output text
          
          if [ "$STATUS" != "Success" ]; then
            echo "❌ SSM Command failed with status: $STATUS"
            exit 1
          fi
