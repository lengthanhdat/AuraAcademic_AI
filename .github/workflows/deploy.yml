name: Deploy AI Service → EC2 GPU

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2 GPU
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2 GPU via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AI_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            set -e
            if [ ! -d "/opt/aura-ai" ]; then
              echo "Cloning repo for the first time..."
              sudo mkdir -p /opt/aura-ai
              sudo chown -R $USER:$USER /opt/aura-ai
              git clone https://github.com/lengthanhdat/AuraAcademic_AI.git /opt/aura-ai
              cd /opt/aura-ai
              sudo apt-get update
              sudo apt-get install -y python3-venv
              python3 -m venv venv
              if ! command -v pm2 &> /dev/null; then
                curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
                sudo apt-get install -y nodejs
                sudo npm install -g pm2
              fi
            fi
            
            # Auto-resize partition in case EBS was expanded but OS didn't catch up
            sudo growpart /dev/nvme0n1 1 || true
            sudo resize2fs /dev/nvme0n1p1 || true
            sudo resize2fs /dev/root || true
            
            # Clean up disk space
            sudo apt-get clean
            rm -rf ~/.cache/pip
            
            cd /opt/aura-ai
            git fetch origin main
            git reset --hard origin/main

            source venv/bin/activate
            pip install --no-cache-dir -r requirements.txt -q

            # Create .env file for LiteLLM
            cat <<ENV_EOF > .env
            GEMINI_API_KEY_1=${{ secrets.GEMINI_API_KEY }}
            GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY }}
            GEMINI_API_KEY_3=${{ secrets.GEMINI_API_KEY }}
            GEMINI_API_KEY_4=${{ secrets.GEMINI_API_KEY }}
            GEMINI_API_KEY_5=${{ secrets.GEMINI_API_KEY }}
            GROQ_API_KEY_1=${{ secrets.GROQ_API_KEY }}
            GROQ_API_KEY_2=${{ secrets.GROQ_API_KEY }}
            GROQ_API_KEY_3=${{ secrets.GROQ_API_KEY }}
            GROQ_API_KEY_4=${{ secrets.GROQ_API_KEY }}
            GROQ_API_KEY_5=${{ secrets.GROQ_API_KEY }}
            ENV_EOF
            pm2 delete aura-ai || true
            pm2 start bash \
              --name "aura-ai" \
              -- -c 'cd /opt/aura-ai && source venv/bin/activate && export BACKEND_API_URL="${{ secrets.BACKEND_API_URL }}" && python main.py'

            pm2 delete aura-litellm || true
            pm2 start bash \
              --name "aura-litellm" \
              -- -c 'cd /opt/aura-ai && source venv/bin/activate && set -a && source .env && set +a && litellm --config litellm_config.yaml --port 4000'

            pm2 save
            
            echo "Waiting for services to start..."
            for i in {1..6}; do
              sleep 5
              if curl -s -f http://localhost:8001/docs > /dev/null; then
                echo "✅ aura-ai (FastAPI) is up!"
                break
              fi
              echo "Waiting for aura-ai..."
            done

            for i in {1..6}; do
              sleep 5
              if curl -s -f http://localhost:4000/health > /dev/null; then
                echo "✅ aura-litellm is up!"
                break
              fi
              echo "Waiting for aura-litellm..."
            done

            if curl -s -f http://localhost:8001/docs > /dev/null && curl -s -f http://localhost:4000/health > /dev/null; then
              echo "✅ All services deployed successfully!"
            else
              echo "❌ Health check failed. Dumping PM2 logs:"
              pm2 logs --lines 50 --nostream
              exit 1
            fi
